name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # ─── segurança ────────────────────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          working-directory: backend
          bundler-cache: true

      - name: Brakeman (static analysis)
        run: bin/brakeman --no-pager

      - name: bundler-audit (vulnerable gems)
        run: bin/bundler-audit check --update

  # ─── lint ─────────────────────────────────────────────────────────────────
  lint:
    name: RuboCop
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          working-directory: backend
          bundler-cache: true

      - uses: actions/cache@v4
        env:
          DEPS_HASH: ${{ hashFiles('backend/.ruby-version', 'backend/**/.rubocop.yml', 'backend/Gemfile.lock') }}
        with:
          path: backend/${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPS_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: rubocop-${{ runner.os }}-${{ env.DEPS_HASH }}-

      - name: RuboCop
        run: bin/rubocop -f github

  # ─── testes ───────────────────────────────────────────────────────────────
  test:
    name: RSpec (coverage ≥ 80%)
    runs-on: ubuntu-latest
    needs: [security, lint]
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/watchlist_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY_BASE: test_secret_key_base_at_least_32_characters_long

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          working-directory: backend
          bundler-cache: true

      - name: Setup test database
        run: bundle exec rails db:create db:schema:load

      - name: Run RSpec
        run: bundle exec rspec --format progress --format RspecJunitFormatter --out tmp/rspec.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rspec-results
          path: backend/tmp/rspec.xml
